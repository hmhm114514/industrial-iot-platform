server:
  port: 8080
spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: '*'
            allowedMethods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
            allowedHeaders: '*'
            allowCredentials: false
            maxAge: 3600
      routes:
        - id: visual-video-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/screens/**,/api/video-devices/**,/api/video-streams/**,/api/video-alarm-tasks/**
        - id: platform-core-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/**
app:
  token: panda-iot-demo-token
