server:
  port: 8081
spring:
  application:
    name: platform-core-service
  datasource:
    url: jdbc:h2:file:./data/platform-core-db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
app:
  token: panda-iot-demo-token
  ai:
    enabled: ${APP_AI_ENABLED:true}
    base-url: ${MAAS_BASE_URL:https://maas.icompify.com:32788/v1}
    model: ${MAAS_MODEL:deepseek-v4-flash}
    api-key: ${MAAS_API_KEY:}
    timeout-ms: ${MAAS_TIMEOUT_MS:25000}
    allow-local-key-file: ${MAAS_ALLOW_LOCAL_KEY_FILE:true}
